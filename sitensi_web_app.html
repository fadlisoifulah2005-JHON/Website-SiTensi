<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiTensi - Pemantau Hipertensi Cerdas</title>
    
    <!-- Memuat Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Memuat Babel untuk menerjemahkan JSX di dalam browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- CSS Kustom untuk Animasi -->
    <style>
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .zoom-in-95 { animation: zoomIn 0.3s ease-out forwards; }
        .slide-in-from-bottom-4 { animation: slideUp 0.4s ease-out forwards; }
        .slide-in-from-bottom-10 { animation: slideUp10 0.4s ease-out forwards; }
        .slide-in-from-top-2 { animation: slideDown 0.3s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp10 { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modifikasi scrollbar agar rapi */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 antialiased">
    
    <!-- Wadah utama Aplikasi -->
    <div id="root"></div>

    <!-- Script Aplikasi Utama -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponen SVG sebaris (inline)
        const Activity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const HeartPulse = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const Pill = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>;
        const Footprints = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/><path d="M16 17h4"/><path d="M4 13h4"/></svg>;
        const Utensils = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const Droplets = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 6.3 7 6.3s-2.15 2.76-3.29 3.69C2.57 10.92 2 12.02 2 13.18 2 15.4 3.8 17.2 6 17.2Z"/><path d="M16 21c2.2 0 4-1.8 4-4.03 0-1.16-.57-2.25-1.71-3.18S16 11 16 11s-2.15 2.76-3.29 3.69C11.57 15.62 11 16.71 11 17.87 11 20.1 12.8 21.9 15 21.9Z"/></svg>;
        const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const Circle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const ChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const Bell = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>;
        const Scale = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
        const BookOpen = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Award = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
        const Edit3 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
        const Lock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const Mail = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const User = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const LogOut = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const Camera = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;

        const App = () => {
          // --- FUNGSI DINAMIS UNTUK GRAFIK (Generate 7 Hari Terakhir dari HP) ---
          const getDynamicBPHistory = () => {
            const baseMock = [
              { sys: 120, dia: 80 }, { sys: 125, dia: 82 }, { sys: 145, dia: 92 },
              { sys: 130, dia: 85 }, { sys: 118, dia: 78 }, { sys: 138, dia: 88 },
              { sys: 122, dia: 80 }
            ];
            const now = new Date();
            return baseMock.map((data, index) => {
              const d = new Date(now);
              d.setDate(d.getDate() - (6 - index));
              let dayName = new Intl.DateTimeFormat('id-ID', { weekday: 'short' }).format(d);
              dayName = dayName.replace('.', '');
              return { ...data, day: dayName };
            });
          };

          // DATABASE SIMULASI
          const [usersDb, setUsersDb] = useState([
            { 
              email: 'budi@email.com', 
              password: 'password123', 
              name: 'Budi Utomo', 
              age: 45, 
              gender: 'Laki-laki', 
              stepGoal: 8000, 
              currentSteps: 6430,
              weight: 65,
              height: 166,
              waterIntake: 1.5,
              avatarUrl: null,
              bpHistory: getDynamicBPHistory(),
              meds: [
                { id: 1, name: 'Amlodipine 5mg', time: '08:00', taken: true },
                { id: 2, name: 'Lisinopril 10mg', time: '20:00', taken: false },
              ]
            }
          ]);

          // STATE AUTENTIKASI
          const [user, setUser] = useState(null);
          const [authMode, setAuthMode] = useState('login'); 
          const [authFields, setAuthFields] = useState({ name: '', email: '', password: '', agreeTerms: false });

          // DOA & SAPAAN
          const prayers = [
            "Semoga detak jantung Anda selalu stabil hari ini. Ingat, ketenangan adalah kunci kesehatan pembuluh darah Anda. ❤️",
            "Kesehatan adalah berkah paling indah. Mari bersama-sama mengontrol tensi darah agar bisa terus berkumpul bahagia bersama keluarga. 🌿",
            "Setiap langkah kaki kecil dan segelas air putih hangat hari ini adalah investasi kesehatan bagi masa depan Anda. Tetap semangat!",
            "Hari baru, harapan baru. Semoga tekanan darah Anda hari ini berada dalam zona hijau dan tubuh Anda dipenuhi stamina sehat.",
            "Kami mendoakan agar pikiran Anda dilingkupi kedamaian hari ini. Kurangi garam, perbanyak senyuman, sehat selalu bersama SiTensi!"
          ];
          const [currentPrayer, setCurrentPrayer] = useState(prayers[0]);

          useEffect(() => {
            const randomIdx = Math.floor(Math.random() * prayers.length);
            setCurrentPrayer(prayers[randomIdx]);
          }, [authMode, user]);

          // SISTEM MODAL KUSTOM
          const [customAlert, setCustomAlert] = useState(null); 
          const [customConfirm, setCustomConfirm] = useState(null); 

          const [activeTab, setActiveTab] = useState('dashboard');
          const [currentTime, setCurrentTime] = useState(new Date());

          // DATA PEMANTAUAN AKUN
          const [bpHistory, setBpHistory] = useState([]);
          const [selectedBpIndex, setSelectedBpIndex] = useState(6);
          const [showBpForm, setShowBpForm] = useState(false);
          
          const getTodayShortName = () => {
            return new Intl.DateTimeFormat('id-ID', { weekday: 'short' }).format(new Date()).replace('.','');
          };
          const [bpInput, setBpInput] = useState({ day: getTodayShortName(), sys: '', dia: '' });

          const [meds, setMeds] = useState([]);
          const [showMedForm, setShowMedForm] = useState(false);
          const [medInput, setMedInput] = useState({ name: '', time: '' });

          const [waterIntake, setWaterIntake] = useState(1.5);
          const [showWaterModal, setShowWaterModal] = useState(false);
          const [customWater, setCustomWater] = useState('');

          const [weight, setWeight] = useState(65);
          const [height, setHeight] = useState(166);
          const [showBmiModal, setShowBmiModal] = useState(false);
          const [weightInput, setWeightInput] = useState('65');
          const [heightInput, setHeightInput] = useState('166');

          const [userProfile, setUserProfile] = useState({ age: 45, gender: 'Laki-laki', stepGoal: 8000, currentSteps: 6430, avatarUrl: null });
          const [showProfileModal, setShowProfileModal] = useState(false);
          const [profileInput, setProfileInput] = useState({ name: '', age: '45', gender: 'Laki-laki', stepGoal: '8000', currentSteps: '6430', avatarUrl: null });
          
          const fileInputRef = useRef(null);

          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 60000);
            return () => clearInterval(timer);
          }, []);

          // FUNGSI AUTENTIKASI
          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (authFields.email && authFields.password) {
              const matchedUser = usersDb.find(
                u => u.email.toLowerCase() === authFields.email.toLowerCase() && u.password === authFields.password
              );

              if (matchedUser) {
                setUser({ name: matchedUser.name, email: matchedUser.email });
                setBpHistory(matchedUser.bpHistory);
                setMeds(matchedUser.meds);
                setWaterIntake(matchedUser.waterIntake);
                setWeight(matchedUser.weight);
                setHeight(matchedUser.height);
                setUserProfile({
                  age: matchedUser.age,
                  gender: matchedUser.gender,
                  stepGoal: matchedUser.stepGoal,
                  currentSteps: matchedUser.currentSteps,
                  avatarUrl: matchedUser.avatarUrl
                });
                setSelectedBpIndex(matchedUser.bpHistory.length - 1);
                setAuthFields({ name: '', email: '', password: '', agreeTerms: false });
              } else {
                setCustomAlert({
                  title: 'Gagal Masuk',
                  message: 'Alamat email atau kata sandi Anda salah. Gunakan "budi@email.com" & "password123" atau daftarkan akun baru Anda!'
                });
              }
            }
          };

          const handleRegisterSubmit = (e) => {
            e.preventDefault();
            if (authFields.name && authFields.email && authFields.password) {
              if (!authFields.agreeTerms) {
                setCustomAlert({ title: 'Syarat & Ketentuan', message: 'Anda harus menyetujui syarat layanan SiTensi untuk melanjutkan pendaftaran.' });
                return;
              }
              const isEmailExist = usersDb.some(u => u.email.toLowerCase() === authFields.email.toLowerCase());
              if (isEmailExist) {
                setCustomAlert({ title: 'Email Terdaftar', message: 'Alamat email ini sudah terdaftar. Silakan masuk.' });
                return;
              }

              const newUserObj = {
                email: authFields.email, password: authFields.password, name: authFields.name,
                age: 35, gender: 'Laki-laki', stepGoal: 8000, currentSteps: 0, weight: 60, height: 165, waterIntake: 0, avatarUrl: null,
                bpHistory: getDynamicBPHistory().map(item => ({...item, sys: 120, dia: 80})), 
                meds: []
              };

              setUsersDb([...usersDb, newUserObj]);
              setUser({ name: newUserObj.name, email: newUserObj.email });
              setBpHistory(newUserObj.bpHistory);
              setMeds(newUserObj.meds);
              setWaterIntake(newUserObj.waterIntake);
              setWeight(newUserObj.weight);
              setHeight(newUserObj.height);
              setUserProfile({ age: newUserObj.age, gender: newUserObj.gender, stepGoal: newUserObj.stepGoal, currentSteps: newUserObj.currentSteps, avatarUrl: newUserObj.avatarUrl });
              setSelectedBpIndex(newUserObj.bpHistory.length - 1);
              setAuthFields({ name: '', email: '', password: '', agreeTerms: false });
              
              setCustomAlert({ title: 'Pendaftaran Berhasil', message: `Selamat datang ${newUserObj.name}! Akun Anda telah dibuat.` });
            }
          };

          const syncUserDataToDb = (updatedProfile = {}, updatedHealth = {}) => {
            if (!user) return;
            setUsersDb(prevDb => prevDb.map(u => {
              if (u.email.toLowerCase() === user.email.toLowerCase()) {
                return {
                  ...u,
                  name: updatedProfile.name || u.name,
                  age: updatedProfile.age !== undefined ? updatedProfile.age : u.age,
                  gender: updatedProfile.gender || u.gender,
                  stepGoal: updatedProfile.stepGoal !== undefined ? updatedProfile.stepGoal : u.stepGoal,
                  currentSteps: updatedProfile.currentSteps !== undefined ? updatedProfile.currentSteps : u.currentSteps,
                  avatarUrl: updatedProfile.avatarUrl !== undefined ? updatedProfile.avatarUrl : u.avatarUrl,
                  weight: updatedHealth.weight !== undefined ? updatedHealth.weight : u.weight,
                  height: updatedHealth.height !== undefined ? updatedHealth.height : u.height,
                  waterIntake: updatedHealth.waterIntake !== undefined ? updatedHealth.waterIntake : u.waterIntake,
                  bpHistory: updatedHealth.bpHistory || u.bpHistory,
                  meds: updatedHealth.meds || u.meds
                };
              }
              return u;
            }));
          };

          const handleLogoutClick = () => {
            setCustomConfirm({
              message: 'Apakah Anda yakin ingin keluar dari akun SiTensi Anda? Data hari ini aman tersimpan.',
              onConfirm: () => {
                syncUserDataToDb(
                  { name: user.name, ...userProfile },
                  { weight, height, waterIntake, bpHistory, meds }
                );
                setUser(null);
                setAuthMode('login');
                setActiveTab('dashboard');
                setCustomConfirm(null);
                setShowProfileModal(false);
              }
            });
          };

          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => {
                setProfileInput({ ...profileInput, avatarUrl: reader.result });
              };
              reader.readAsDataURL(file);
            }
          };

          const toggleMed = (id) => {
            const updatedMeds = meds.map(med => med.id === id ? { ...med, taken: !med.taken } : med);
            setMeds(updatedMeds);
            syncUserDataToDb({}, { meds: updatedMeds });
          };

          const handleAddBP = () => {
            if(bpInput.sys && bpInput.dia) {
              const newEntry = { day: bpInput.day, sys: parseInt(bpInput.sys), dia: parseInt(bpInput.dia) };
              const updatedHistory = [...bpHistory];
              const existingIdx = updatedHistory.findIndex(item => item.day === bpInput.day);
              
              if (existingIdx !== -1) {
                updatedHistory[existingIdx] = newEntry;
                setSelectedBpIndex(existingIdx);
              } else {
                updatedHistory.shift();
                updatedHistory.push(newEntry);
                setSelectedBpIndex(updatedHistory.length - 1);
              }

              setBpHistory(updatedHistory);
              syncUserDataToDb({}, { bpHistory: updatedHistory });
              setShowBpForm(false);
              setBpInput({ day: getTodayShortName(), sys: '', dia: '' });
            }
          };

          const handleAddMed = () => {
            if(medInput.name && medInput.time) {
              const newMed = { id: Date.now(), name: medInput.name, time: medInput.time, taken: false };
              const updatedMeds = [...meds, newMed];
              setMeds(updatedMeds);
              syncUserDataToDb({}, { meds: updatedMeds });
              setShowMedForm(false);
              setMedInput({ name: '', time: '' });
              setCustomAlert({ title: 'Alarm Aktif', message: `Alarm obat "${medInput.name}" diset pukul ${medInput.time} WIB.` });
            }
          };

          const handleAddWater = (amount) => {
            const newIntake = parseFloat((waterIntake + amount).toFixed(2));
            const targetIntake = newIntake > 5 ? 5 : newIntake;
            setWaterIntake(targetIntake);
            syncUserDataToDb({}, { waterIntake: targetIntake });
          };

          const handleCustomWaterSubmit = () => {
            const amount = parseFloat(customWater) / 1000;
            if (!isNaN(amount) && amount > 0) {
              handleAddWater(amount);
              setCustomWater('');
              setShowWaterModal(false);
            }
          };

          const handleBmiSubmit = () => {
            const w = parseFloat(weightInput);
            const h = parseFloat(heightInput);
            if (!isNaN(w) && !isNaN(h) && w > 0 && h > 0) {
              setWeight(w);
              setHeight(h);
              syncUserDataToDb({}, { weight: w, height: h });
              setShowBmiModal(false);
            }
          };

          const handleProfileSubmit = () => {
            const parsedAge = parseInt(profileInput.age);
            const parsedGoal = parseInt(profileInput.stepGoal);
            const parsedSteps = parseInt(profileInput.currentSteps);

            const updatedName = profileInput.name.trim() ? profileInput.name : user.name;
            const finalAge = isNaN(parsedAge) ? userProfile.age : parsedAge;
            const finalGoal = isNaN(parsedGoal) ? userProfile.stepGoal : parsedGoal;
            const finalSteps = isNaN(parsedSteps) ? userProfile.currentSteps : parsedSteps;

            setUser({ ...user, name: updatedName });
            setUserProfile({
              age: finalAge,
              gender: profileInput.gender,
              stepGoal: finalGoal,
              currentSteps: finalSteps,
              avatarUrl: profileInput.avatarUrl
            });

            syncUserDataToDb(
              { name: updatedName, age: finalAge, gender: profileInput.gender, stepGoal: finalGoal, currentSteps: finalSteps, avatarUrl: profileInput.avatarUrl },
              {}
            );

            setShowProfileModal(false);
          };

          const calculatedBmi = height > 0 ? parseFloat((weight / ((height / 100) ** 2)).toFixed(1)) : 0;
          const getBmiStatus = (bmiValue) => {
            if (bmiValue < 18.5) return { label: 'Kurus / Kurang Berat', color: 'text-orange-500 bg-orange-50 border-orange-100' };
            if (bmiValue >= 18.5 && bmiValue <= 24.9) return { label: 'Berat Badan Ideal', color: 'text-green-600 bg-green-50 border-green-100' };

                          <p className="text-xl font-extrabold text-blue-900 mt-1">{waterIntake} L <span className="text-xs font-normal text-slate-400">/ 2.0 L</span></p>
                          <div className="w-full bg-blue-100 h-1.5 rounded-full mt-2"><div className="bg-blue-500 h-full rounded-full" style={{ width: `${Math.min((waterIntake / 2) * 100, 100)}%` }}></div></div>
                        </div>
                        <div className="flex gap-2 mt-4">
                          <button onClick={() => handleAddWater(0.25)} className="flex-1 py-1.5 bg-white text-blue-700 font-bold text-xs rounded-xl border border-blue-200 active:scale-95">+250ml</button>
                          <button onClick={() => handleAddWater(0.5)} className="flex-1 py-1.5 bg-blue-600 text-white font-bold text-xs rounded-xl active:scale-95">+500ml</button>
                          <button onClick={() => setWaterIntake(0)} className="py-1.5 px-3 bg-slate-100 text-slate-400 font-bold text-xs rounded-xl active:scale-95">Reset</button>
                        </div>
                        {showWaterModal && (
                          <div className="absolute inset-0 bg-white/95 backdrop-blur-xs flex flex-col justify-center p-4 z-20">
                            <input type="number" placeholder="Input (ml)" value={customWater} onChange={(e) => setCustomWater(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs mb-3" />
                            <div className="flex gap-2">
                              <button onClick={() => setShowWaterModal(false)} className="flex-1 py-1.5 text-xs font-bold bg-slate-100 rounded-lg">Batal</button>
                              <button onClick={handleCustomWaterSubmit} className="flex-1 py-1.5 text-xs font-bold text-white bg-blue-600 rounded-lg">Tambah</button>
                            </div>
                          </div>
                        )}
                      </div>
                      <div className="bg-emerald-50/70 p-5 rounded-3xl shadow-sm border border-emerald-100 flex flex-col justify-between">
                        <div className="flex justify-between items-start mb-2">
                          <div className="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center"><Scale className="w-5 h-5 text-emerald-600" /></div>
                          <button onClick={() => { setWeightInput(weight.toString()); setHeightInput(height.toString()); setShowBmiModal(true); }} className="text-[10px] font-bold text-emerald-700 bg-white border border-emerald-200 px-2.5 py-1 rounded-lg">Update BB/TB</button>
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-semibold">Indeks Massa Tubuh (BMI)</p>
                          <p className="text-xl font-extrabold text-emerald-900 mt-1">{calculatedBmi} BMI</p>
                          <div className={`mt-2 px-3 py-1.5 rounded-lg border text-[10px] font-bold text-center ${bmiStatus.color}`}>{bmiStatus.label}</div>
                          <div className="flex gap-4 mt-3 text-xs text-slate-500 font-semibold"><span>Berat: <b>{weight} kg</b></span><span>Tinggi: <b>{height} cm</b></span></div>
                        </div>
                        {showBmiModal && (
                          <div className="absolute inset-0 bg-white/95 backdrop-blur-xs flex flex-col justify-center p-4 z-20">
                            <input type="number" value={weightInput} onChange={(e) => setWeightInput(e.target.value)} placeholder="Berat (kg)" className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs mb-2" />
                            <input type="number" value={heightInput} onChange={(e) => setHeightInput(e.target.value)} placeholder="Tinggi (cm)" className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs mb-3" />
                            <div className="flex gap-2">
                              <button onClick={() => setShowBmiModal(false)} className="flex-1 py-1.5 text-xs font-bold bg-slate-100 rounded-lg">Batal</button>
                              <button onClick={handleBmiSubmit} className="flex-1 py-1.5 text-xs font-bold text-white bg-emerald-600 rounded-lg">Simpan</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* TAB 3: EDUKASI HIPERTENSI LENGKAP */}
                  {activeTab === 'edu' && (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-4">
                      <div className="flex items-center mb-1">
                        <BookOpen className="w-6 h-6 text-blue-600 mr-2" />
                        <h2 className="text-xl font-bold text-slate-800">Pusat Edukasi</h2>
                      </div>
                      
                      <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <h3 className="font-extrabold text-blue-900 mb-2 text-sm flex items-center"><Info className="w-4 h-4 mr-1.5" /> Dasar Hipertensi</h3>
                        <p className="text-xs text-slate-600 leading-relaxed text-justify">
                          Hipertensi dijuluki sebagai *"The Silent Killer"* karena dapat merusak organ tubuh secara diam-diam tanpa gejala awal yang parah. Kondisi ini terjadi ketika tekanan darah ke dinding arteri terus-menerus tinggi (di atas 130/80 mmHg), memaksa jantung bekerja ekstra keras untuk memompa darah ke seluruh tubuh.
                        </p>
                      </div>

                      {/* EDUKASI DIET DASH */}
                      <div className="bg-emerald-50 border border-emerald-100 p-5 rounded-3xl shadow-sm">
                        <h3 className="font-extrabold text-emerald-900 mb-2 text-sm flex items-center"><Utensils className="w-4 h-4 mr-1.5" /> Rahasia Diet DASH</h3>
                        <p className="text-xs text-slate-700 leading-relaxed mb-3">
                          **DASH** (*Dietary Approaches to Stop Hypertension*) adalah metode diet yang diakui secara global untuk menurunkan tensi. Prinsip utamanya adalah:
                        </p>
                        <ul className="space-y-2 text-[11px] text-slate-700 font-medium">
                          <li className="flex items-start"><CheckCircle2 className="w-3.5 h-3.5 mr-1.5 text-emerald-500 flex-shrink-0 mt-0.5" /> <b>Batasi Natrium (Garam):</b> Maksimal 1 sendok teh (1500-2300mg) per hari. Waspadai garam tersembunyi pada mi instan, sosis, dan saus.</li>
                          <li className="flex items-start"><CheckCircle2 className="w-3.5 h-3.5 mr-1.5 text-emerald-500 flex-shrink-0 mt-0.5" /> <b>Tingkatkan Kalium:</b> Kalium membantu membuang natrium via urine. Sumber: Pisang, bayam, ubi, alpukat.</li>
                          <li className="flex items-start"><CheckCircle2 className="w-3.5 h-3.5 mr-1.5 text-emerald-500 flex-shrink-0 mt-0.5" /> <b>Hindari Lemak Jenuh:</b> Ganti gorengan (minyak kelapa sawit) dengan rebusan, kukusan, atau panggang.</li>
                        </ul>
                      </div>

                      {/* MITOS VS FAKTA */}
                      <div className="bg-slate-800 p-5 rounded-3xl shadow-md text-white">
                        <h3 className="font-extrabold text-orange-400 mb-4 text-sm flex items-center">Mitos vs Fakta Hipertensi</h3>
                        <div className="space-y-4">
                          <div>
                            <div className="bg-red-500/20 text-red-300 text-[10px] font-bold px-2 py-0.5 rounded w-fit mb-1">Mitos</div>
                            <p className="text-xs font-semibold">"Saya merasa sehat dan tidak pusing, tensi saya pasti normal."</p>
                            <div className="bg-emerald-500/20 text-emerald-300 text-[10px] font-bold px-2 py-0.5 rounded w-fit mt-2 mb-1">Fakta</div>
                            <p className="text-xs text-slate-300 leading-relaxed">Hipertensi sering kali tidak memiliki gejala spesifik hingga mencapai tahap krisis. Satu-satunya cara memastikan adalah dengan mengukurnya secara rutin.</p>
                          </div>
                          <div className="border-t border-slate-700 pt-3">
                            <div className="bg-red-500/20 text-red-300 text-[10px] font-bold px-2 py-0.5 rounded w-fit mb-1">Mitos</div>
                            <p className="text-xs font-semibold">"Hanya orang tua yang bisa terkena darah tinggi."</p>
                            <div className="bg-emerald-500/20 text-emerald-300 text-[10px] font-bold px-2 py-0.5 rounded w-fit mt-2 mb-1">Fakta</div>
                            <p className="text-xs text-slate-300 leading-relaxed">Gaya hidup modern (stres, junk food, kurang gerak) membuat pemuda berusia 20-30an kini sangat rentan terkena hipertensi dini.</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* TAB 4: REKOMENDASI MENU DIET LOKAL */}
                  {activeTab === 'diet' && (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-4">
                      <div className="flex justify-between items-end mb-1">
                        <div>
                          <h2 className="text-xl font-bold text-slate-800">Menu Diet Tensi</h2>
                          <p className="text-xs text-slate-500">Inspirasi masakan lokal rendah garam</p>
                        </div>
                      </div>

                      <div className="space-y-4">
                        {/* Menu 1 */}
                        <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                          <div className="h-36 bg-slate-200 relative overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=600&q=80" alt="Sayur Bening Bayam" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                            <div className="absolute top-3 left-3 bg-emerald-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-lg shadow-sm">Menu Sarapan / Siang</div>
                          </div>
                          <div className="p-5">
                            <h3 className="font-extrabold text-slate-800 text-base mb-1">Sayur Bening Bayam Jagung</h3>
                            <p className="text-xs text-slate-500 leading-relaxed mb-3">Bayam kaya akan kalium alami yang merelaksasi pembuluh darah. Sangat aman dan sehat.</p>
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-700 mb-1">👨‍🍳 Cara Pengolahan:</p>
                              <ol className="list-decimal pl-4 text-[11px] text-slate-600 space-y-1">
                                <li>Didihkan air putih bersama irisan bawang merah dan temu kunci.</li>
                                <li>Masukkan potongan jagung manis hingga empuk (10 menit).</li>
                                <li>Masukkan daun bayam, masak sebentar (1-2 menit) agar vitamin tidak hilang. Batasi garam sejumput saja.</li>
                              </ol>
                            </div>
                          </div>
                        </div>

                        {/* Menu 2 */}
                        <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                          <div className="h-36 bg-slate-200 relative overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1599813958742-88f57fb421e4?auto=format&fit=crop&w=600&q=80" alt="Pepes Ikan Nila" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                            <div className="absolute top-3 left-3 bg-orange-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-lg shadow-sm">Lauk Makan Siang</div>
                          </div>
                          <div className="p-5">
                            <h3 className="font-extrabold text-slate-800 text-base mb-1">Pepes Ikan Nila Daun Kemangi</h3>
                            <p className="text-xs text-slate-500 leading-relaxed mb-3">Alternatif lauk tanpa digoreng minyak kelapa sawit. Ikan kaya protein dan bumbu rempah sebagai pengganti rasa gurih micin.</p>
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-700 mb-1">👨‍🍳 Cara Pengolahan:</p>
                              <ol className="list-decimal pl-4 text-[11px] text-slate-600 space-y-1">
                                <li>Haluskan bumbu kuning (kunyit, kemiri, bawang merah/putih, jahe).</li>
                                <li>Balurkan merata pada ikan nila yang sudah dibersihkan.</li>
                                <li>Bungkus dalam daun pisang bersama daun kemangi & irisan tomat, lalu kukus selama 40 menit hingga matang sempurna.</li>
                              </ol>
                            </div>
                          </div>
                        </div>

                        {/* Menu 3 */}
                        <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                          <div className="h-36 bg-slate-200 relative overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1596097635121-14b63b7a0c19?auto=format&fit=crop&w=600&q=80" alt="Rebusan Ubi Jalar" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                            <div className="absolute top-3 left-3 bg-amber-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-lg shadow-sm">Pengganti Nasi</div>
                          </div>
                          <div className="p-5">
                            <h3 className="font-extrabold text-slate-800 text-base mb-1">Ubi Jalar Rebus Madu</h3>
                            <p className="text-xs text-slate-500 leading-relaxed mb-3">Sumber karbohidrat kompleks bebas natrium, kaya serat yang membuat kenyang lebih lama tanpa melonjakkan gula darah.</p>
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-700 mb-1">👨‍🍳 Cara Pengolahan:</p>
                              <ol className="list-decimal pl-4 text-[11px] text-slate-600 space-y-1">
                                <li>Cuci bersih ubi jalar (potong jika terlalu besar).</li>
                                <li>Kukus dalam dandang panas selama 20-30 menit.</li>
                                <li>Sajikan selagi hangat. *Opsional:* Beri 1 sendok teh madu murni di atasnya untuk rasa manis alami.</li>
                              </ol>
                            </div>
                          </div>
                        </div>
                        
                        {/* Menu 4 */}
                        <div className="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                          <div className="h-36 bg-slate-200 relative overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?auto=format&fit=crop&w=600&q=80" alt="Pisang Ambon" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                            <div className="absolute top-3 left-3 bg-blue-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-lg shadow-sm">Pencuci Mulut</div>
                          </div>
                          <div className="p-5">
                            <h3 className="font-extrabold text-slate-800 text-base mb-1">Semangka Segar & Pisang Ambon</h3>
                            <p className="text-xs text-slate-500 leading-relaxed mb-3">Dua kombo buah terbaik pelawan darah tinggi. Semangka merelaksasi arteri, Pisang menyeimbangkan natrium tubuh.</p>
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-700 mb-1">👨‍🍳 Cara Pengolahan / Konsumsi:</p>
                              <ul className="list-disc pl-4 text-[11px] text-slate-600 space-y-1">
                                <li>Dapat dimakan langsung secara bergantian sebagai camilan sore.</li>
                                <li>*Alternatif:* Blender semangka tanpa gula tambahan untuk dijadikan jus penyegar dahaga di siang hari.</li>
                              </ul>
                            </div>
                          </div>
                        </div>

                      </div>
                    </div>
                  )}

                </div>

                {/* MODAL PENGATURAN PROFIL & UPLOAD FOTO */}
                {showProfileModal && (
                  <div className="fixed inset-0 flex flex-col items-center justify-end bg-black/60 z-50 p-4 animate-in fade-in duration-200 sm:justify-center">
                    <div className="bg-white rounded-[32px] p-6 w-full max-w-sm shadow-2xl border border-slate-100 animate-in slide-in-from-bottom-10 sm:slide-in-from-bottom-0 sm:zoom-in-95">
                      
                      <div className="flex flex-col items-center mb-5 relative">
                        {/* Area Upload Avatar */}
                        <div className="relative group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                          <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center border-4 border-slate-50 overflow-hidden shadow-sm">
                            <img src={profileInput.avatarUrl || getProfileImage(userProfile.avatarUrl, user.name)} alt="Avatar" className="w-full h-full object-cover" />
                          </div>
                          <div className="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <Camera className="w-6 h-6 text-white" />
                          </div>
                          <div className="absolute -bottom-1 -right-1 bg-blue-600 text-white p-1.5 rounded-full border-2 border-white shadow-sm">
                            <Camera className="w-3.5 h-3.5" />
                          </div>
                        </div>
                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                        
                        <h3 className="font-extrabold text-slate-800 text-base mt-3">Pengaturan Akun</h3>
                        <p className="text-[10px] text-slate-400">Ketuk foto untuk mengganti profil</p>
                      </div>
                      
                      <div className="space-y-3 mb-5">
                        <div>
                          <label className="text-[10px] text-slate-500 block mb-1 font-bold">Nama Lengkap</label>
                          <input type="text" value={profileInput.name} onChange={(e) => setProfileInput({ ...profileInput, name: e.target.value })} className="w-full bg-slate-50/80 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 font-medium text-slate-700" />
                        </div>
                        <div className="flex gap-3">
                          <div className="flex-1">
                            <label className="text-[10px] text-slate-500 block mb-1 font-bold">Umur (Tahun)</label>
                            <input type="number" value={profileInput.age} onChange={(e) => setProfileInput({ ...profileInput, age: e.target.value })} className="w-full bg-slate-50/80 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 font-medium text-slate-700" />
                          </div>
                          <div className="flex-1">
                            <label className="text-[10px] text-slate-500 block mb-1 font-bold">Jenis Kelamin</label>
                            <select value={profileInput.gender} onChange={(e) => setProfileInput({ ...profileInput, gender: e.target.value })} className="w-full bg-slate-50/80 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 font-medium text-slate-700">
                              <option value="Laki-laki">Laki-laki</option>
                              <option value="Perempuan">Perempuan</option>
                            </select>
                          </div>
                        </div>
                        <div className="flex gap-3">
                          <div className="flex-1">
                            <label className="text-[10px] text-slate-500 block mb-1 font-bold">Langkah Saat Ini</label>
                            <input type="number" value={profileInput.currentSteps} onChange={(e) => setProfileInput({ ...profileInput, currentSteps: e.target.value })} className="w-full bg-slate-50/80 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 font-medium text-slate-700" />
                          </div>
                          <div className="flex-1">
                            <label className="text-[10px] text-slate-500 block mb-1 font-bold">Target Langkah</label>
                            <input type="number" value={profileInput.stepGoal} onChange={(e) => setProfileInput({ ...profileInput, stepGoal: e.target.value })} className="w-full bg-slate-50/80 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 font-medium text-slate-700" />
                          </div>
                        </div>
                      </div>

                      <div className="border-t border-slate-100 pt-4 flex flex-col gap-2.5">
                        <div className="flex gap-2">
                          <button onClick={() => setShowProfileModal(false)} className="flex-1 py-2.5 text-xs font-bold text-slate-600 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                          <button onClick={handleProfileSubmit} className="flex-1 py-2.5 text-xs font-bold text-white bg-blue-600 rounded-xl hover:bg-blue-700 shadow-md shadow-blue-200 transition-all">Simpan Profil</button>
                        </div>
                        <button onClick={handleLogoutClick} className="w-full py-3 mt-1 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-extrabold rounded-xl flex items-center justify-center transition-all border border-red-100 active:scale-95"><LogOut className="w-4 h-4 mr-1.5" /> Keluar Akun</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* MODAL KONFIRMASI KELUAR */}
                {customConfirm && (
                  <div className="fixed inset-0 flex items-center justify-center bg-black/60 z-50 p-6 animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl border border-slate-100 animate-in zoom-in-95">
                      <div className="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><LogOut className="w-7 h-7" /></div>
                      <h3 className="font-extrabold text-slate-800 text-lg mb-2">Konfirmasi Keluar</h3>
                      <p className="text-xs text-slate-500 leading-relaxed mb-6">{customConfirm.message}</p>
                      <div className="flex gap-3">
                        <button onClick={() => setCustomConfirm(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                        <button onClick={customConfirm.onConfirm} className="flex-1 py-3 bg-red-500 text-white text-xs font-bold rounded-xl shadow-md shadow-red-200 hover:bg-red-600 transition-colors">Ya, Keluar</button>
                      </div>
                    </div>
                  </div>
                )}

                {customAlert && (
                  <div className="fixed inset-0 flex items-center justify-center bg-black/60 z-50 p-6 animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl border border-slate-100 animate-in zoom-in-95">
                      <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><Info className="w-7 h-7" /></div>
                      <h3 className="font-extrabold text-slate-800 text-lg mb-2">{customAlert.title}</h3>
                      <p className="text-xs text-slate-500 leading-relaxed mb-6">{customAlert.message}</p>
                      <button onClick={() => setCustomAlert(null)} className="w-full py-3 bg-blue-600 text-white text-xs font-bold rounded-xl shadow-md shadow-blue-200 hover:bg-blue-700 transition-colors">Mengerti</button>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
